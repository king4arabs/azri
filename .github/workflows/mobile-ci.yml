name: Mobile (Expo) CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/contracts/**"
      - "packages/content/**"
      - ".github/workflows/mobile-ci.yml"

permissions:
  contents: read

jobs:
  mobile:
    name: Typecheck & unit tests (@azri/mobile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build --workspace=@azri/contracts
      - run: npm run typecheck --workspace=@azri/mobile
      - run: npm run test --workspace=@azri/mobile
