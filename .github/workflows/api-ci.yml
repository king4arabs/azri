name: API CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "api/**"
      - "packages/contracts/**"
      - "package.json"
      - ".github/workflows/api-ci.yml"

permissions:
  contents: read

jobs:
  api:
    name: Typecheck & test @azri/api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build --workspace=@azri/contracts
      - run: npm run typecheck --workspace=@azri/api
      - run: npm run test --workspace=@azri/api
