name: Whoop adapter CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "integrations/whoop/**"
      - "packages/contracts/**"
      - "package.json"
      - ".github/workflows/whoop-ci.yml"

permissions:
  contents: read

jobs:
  whoop:
    name: Typecheck & test @azri/whoop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build --workspace=@azri/contracts
      - run: npm run typecheck --workspace=@azri/whoop
      - run: npm run test --workspace=@azri/whoop
