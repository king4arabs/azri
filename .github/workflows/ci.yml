name: CI

# Application-code CI for AZRI.
#
# Covers today: @azri/content, @azri/api, @azri/web.
# When further packages land, add their jobs below.
#
# Healthcare context: every code-introducing PR must pass typecheck +
# tests + build. The docs-validation workflow continues to guard
# documentation quality independently.
#
# iOS / watchOS builds are NOT run here — they require macOS + Xcode.
# See ios/README.md for the local build story; a macOS runner job lands
# when the iOS app ships in v0.4.0.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "packages/**"
      - "api/**"
      - "web/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  content-package:
    name: "@azri/content (Node ${{ matrix.node }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20.x", "22.x"]
    defaults:
      run:
        working-directory: packages/content
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: packages/content/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test

  api:
    name: "@azri/api (Node ${{ matrix.node }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20.x", "22.x"]
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test

  web:
    name: "@azri/web (Node ${{ matrix.node }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20.x", "22.x"]
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
