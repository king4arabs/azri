name: CI

# Application-code CI for AZRI.
#
# Covers: @azri/content, @azri/api, @azri/web via npm workspaces at the
# repository root.
#
# Healthcare context: every code-introducing PR must pass typecheck +
# tests + build. The docs-validation workflow continues to guard
# documentation quality independently.
#
# iOS / watchOS builds are NOT run here — they require macOS + Xcode.
# See ios/README.md for the local build story; a macOS runner job lands
# when the iOS app ships in v0.4.0.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "packages/**"
      - "api/**"
      - "web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  content:
    name: "@azri/content (Node ${{ matrix.node }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace=@azri/content
      - run: npm test --workspace=@azri/content

  api:
    name: "@azri/api (Node ${{ matrix.node }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace=@azri/api
      - run: npm run build --workspace=@azri/api
      - run: npm test --workspace=@azri/api

  web:
    name: "@azri/web (Node ${{ matrix.node }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=web
      - run: npm run typecheck --workspace=web
      - run: npm run build --workspace=web
