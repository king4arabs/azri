name: Contracts CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "packages/contracts/**"
      - "package.json"
      - ".github/workflows/contracts-ci.yml"

permissions:
  contents: read

jobs:
  contracts:
    name: Build, typecheck & test @azri/contracts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm install
      - run: npm run build --workspace=@azri/contracts
      - run: npm run typecheck --workspace=@azri/contracts
      - run: npm run test --workspace=@azri/contracts
