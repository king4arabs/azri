# XcodeGen configuration.
# Run `xcodegen generate` to produce Azri.xcodeproj from this file.
# This file is the single source of truth for the iPhone + Watch project.

name: Azri
options:
  bundleIdPrefix: ai.azri
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  developmentLanguage: ar

targets:
  Azri:
    type: application
    platform: iOS
    sources:
      - path: Azri
      - path: AzriShared
    info:
      path: Azri/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.azri.patient
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  AzriWatch:
    type: application
    platform: watchOS
    sources:
      - path: AzriWatch
      - path: AzriShared
    info:
      path: AzriWatch/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.azri.patient.watchkitapp
        SWIFT_VERSION: "5.10"

  AzriTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AzriTests
    dependencies:
      - target: Azri

  AzriUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AzriUITests
    dependencies:
      - target: Azri
